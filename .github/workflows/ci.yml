name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      # Zero runtime dependencies: the suite runs on stdlib unittest alone.
      - name: Run tests
        run: python -m unittest discover -s tests -v
      - name: Package smoke test
        if: runner.os != 'Windows'
        run: |
          python -m pip install .
          cd examples/demo-repo
          librarian index
          librarian verify && exit 1 || test $? -eq 1   # planted drift must exit 1
          librarian status --hook
      - name: Package smoke test (Windows — no verify; needs /bin/sh)
        if: runner.os == 'Windows'
        run: |
          python -m pip install .
          cd examples/demo-repo
          librarian index
          librarian status

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install ruff
      - run: ruff check src tests
      - run: ruff format --check src tests
